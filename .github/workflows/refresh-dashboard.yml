name: Refresh dashboard data

on:
  workflow_dispatch:
  schedule:
    - cron: "*/15 * * * *"

permissions:
  contents: write
  issues: read

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Check out dashboard
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Refresh status snapshot
        env:
          SHICHAI_READ_TOKEN: ${{ secrets.SHICHAI_READ_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/collect-status.mjs

      - name: Commit generated data
        run: |
          if git diff --quiet -- data/status.json; then
            echo "No dashboard data changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/status.json
          git commit -m "Refresh feature dashboard data"
          git push
